name: CI

on:
  push:
    branches: [main, "phase-*", "phase-*/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # OpenCV and MediaPipe need these shared libraries on headless runners.
      - name: Install system libraries
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # CPU-only PyTorch keeps the install fast; 2.4.1+cpu satisfies the pinned torch==2.4.1.
      - name: Install CPU PyTorch
        run: pip install torch==2.4.1 torchvision==0.19.1 --index-url https://download.pytorch.org/whl/cpu

      - name: Install project (with dev tools)
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Run tests
        run: pytest -v
